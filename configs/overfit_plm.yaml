# MambaFold EqM — PLM-enabled overfit config
# use_plm=True: ESM 임베딩을 trunk 입력에 concat

# ── Data ──────────────────────────────────────────────────────────────────
data_dir: afdb_data/train

# ── Training ──────────────────────────────────────────────────────────────
n_steps: 5000
lr: 1.0e-3
grad_clip: 1.0

# ── Model ─────────────────────────────────────────────────────────────────
d_atom: 256
d_res: 256
d_res_pos: 64
d_local_frame: 64
d_state: 32
mimo_rank: 2
headdim: 64
n_atom_enc: 2
n_trunk: 6
n_atom_dec: 2

# ── PLM ───────────────────────────────────────────────────────────────────
use_plm: true
d_plm: 1024
plm_mode: blend       # blend | esm3 | esmc

# ── W&B ───────────────────────────────────────────────────────────────────
wandb_project: mambafold
wandb_name: null
wandb_tags: [overfit, plm, esm]
wandb_offline: false
no_wandb: false
