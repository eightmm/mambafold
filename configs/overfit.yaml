# MambaFold EqM — overfit config
# 소수 단백질을 암기시키는 sanity check용.
# 여기서 직접 수정하며 실험할 것.

# ── Data ──────────────────────────────────────────────────────────────────
data_dir: /home/jaemin/project/protein/folding/data/overfit

# ── Output ────────────────────────────────────────────────────────────────
out_dir: null           # null → auto: outputs/overfit/{SLURM_JOB_ID|timestamp}

# ── Training ──────────────────────────────────────────────────────────────
n_steps: 5000
lr: 1.0e-3
warmup_steps: 500
grad_clip: 1.0
gamma_schedule: uniform

# ── Model ─────────────────────────────────────────────────────────────────
d_atom: 256
d_res: 256
d_res_pos: 64
d_state: 64
mimo_rank: 4
headdim: 64
n_atom_enc: 2
n_trunk: 6
n_atom_dec: 2

# ── PLM ───────────────────────────────────────────────────────────────────
use_plm: false

# ── W&B ───────────────────────────────────────────────────────────────────
wandb_project: mambafold
wandb_name: null
wandb_tags: [overfit]
wandb_offline: false
no_wandb: false
